# MiCall 运营管理端 —— admin.zsky.com
# 复制到 /etc/nginx/sites-available/micall-admin 并软链到 sites-enabled。
# 静态产物来自 `cd admin && npm run build` 的 admin/dist。
#
# ⚠️ 这是内部后台，应用本身没有登录鉴权 —— 必须靠 nginx 做访问控制。
#    下面用 HTTP Basic Auth；更严可叠加 IP allowlist（allow/deny）。
#
# ⚠️ HTTPS/SSL 由 certbot 管理：本文件是 HTTP-only，`sudo certbot --nginx -d admin.zsky.com`
#    会往里加 443 SSL 块 + 80→443 跳转。**重新 cp 本文件会覆盖掉 certbot 加的 443 块**，
#    导致 https://admin.zsky.com 落回默认站点（用户端）。所以改完本文件、cp 之后，
#    必须**再跑一次 `sudo certbot --nginx -d admin.zsky.com`（选 reinstall）**把 SSL 补回，
#    而不是只 `nginx -s reload`。

server {
    listen 80;
    listen [::]:80;
    server_name admin.zsky.com;

    root /var/www/micall-admin;
    index index.html;

    # ── Let's Encrypt HTTP-01 校验必须绕过 Basic Auth，否则 certbot 取证 401 ──
    # （这通常就是「后台没配上 HTTPS」的原因）
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        allow all;
        default_type "text/plain";
    }

    # ── 访问控制（先建密码文件，见 deploy/README.md）──
    auth_basic "MiCall Admin";
    auth_basic_user_file /etc/nginx/.micall_admin_htpasswd;
    # 可选：仅允许办公网/VPN 出口 IP
    # allow 203.0.113.0/24;
    # deny all;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── 安全响应头（纵深防御）。注意：nginx 里 location 内若再写 add_header 会**覆盖**继承，
    #    故下面带 add_header 的 location 各自重复一份。──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 管理 API 反代（与 admin 的 VITE_API_BASE=https://admin.zsky.com 对应）──
    # 后端 adminapi 本地监听 8788，处理：
    #   POST     /admin/login                 登录发 token
    #   GET/PUT  /admin/api-config            读写 endpoint/key
    #   POST     /admin/api-config/test       连通性测试
    # 同源 + 上面的 Basic Auth 自动覆盖此处；后端只听 127.0.0.1。
    # 注意：SPA 静态在 / 与 /assets/，/admin/ 全部交给后端（不与前端路由冲突）。
    location /admin/ {
        # 关掉 Basic Auth：API 由 app 自身登录（/admin/login 发 Bearer token）鉴权。
        # 否则前端 fetch 带的 Authorization 头会顶掉浏览器的 Basic 凭据 → nginx 401
        # → 每次点按钮都弹密码框（无限弹）。页面（location /）仍保留 Basic Auth 守门。
        #
        # ⚠️ 必须设环境变量 MICALL_ADMIN_PASSWORD（强）+ MICALL_ADMIN_TOKEN（长随机≥16）。
        #    后端已 fail closed：未安全配置时 /admin/login→503、其余 /admin/*→401，
        #    所以即便此处 auth_basic off，未配置也不会裸奔（而非过去的「未设即放行」）。
        #    配置方式见 deploy/README.md（写进 systemd EnvironmentFile / micall.env）。
        auth_basic off;
        client_max_body_size 25m;   # 音色克隆上传人声（wav 可达数 MB）；默认 1m 会 413
        proxy_pass http://127.0.0.1:8788;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
