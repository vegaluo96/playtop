# MiCall 用户端 H5 —— zsky.com
# 复制到 /etc/nginx/sites-available/micall 并软链到 sites-enabled。
# 静态产物来自 `cd frontend && npm run build` 的 frontend/dist。

server {
    listen 80;
    listen [::]:80;
    server_name zsky.com www.zsky.com;

    root /var/www/micall;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── 安全响应头（纵深防御）。microphone=(self)：用户端通话要用麦克风。
    #    注意：location 内若再写 add_header 会覆盖继承，故带 add_header 的 location 各自重复。──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 用户账号 API 反代（同源 /api/，前端无需另配 VITE_API_BASE）──
    # 后端 userapi 本地监听 127.0.0.1:8789，处理：
    #   POST /api/auth/register|login|logout   GET /api/auth/me
    # certbot 升 443 时本 location 一并迁移，浏览器走 https。
    location /api/ {
        proxy_pass http://127.0.0.1:8789;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 实时控制信令 WSS 反代（前端 VITE_SIGNALING_URL=wss://zsky.com/realtime/signal）──
    # 后端 micall.cli run-server 监听 127.0.0.1:8787（仅本地，外网只经此 443 反代）。
    # certbot 会把本 server 升到 443；本 location 一并迁移，于是浏览器走加密 wss://。
    location /realtime/signal {
        # 前端把短期 token 放在 WS query string（?token=...）。关掉本 location 的 access_log，
        # 避免 token 落进 nginx 访问日志（query string 会被 $request 记录）。
        # 彻底方案是改协议：连接后第一条消息带 token（而非 URL）——见 signaling.ts / wsserver.py 的 TODO。
        access_log off;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # 长连接：通话期间不超时
        proxy_send_timeout 3600s;
        proxy_buffering off;        # 实时帧：不缓冲，音频/控制帧到了立刻转发，别攒
        tcp_nodelay on;             # 关 Nagle：小音频帧不被合并延迟（否则可达 ~40-200ms 抖动 → 语音卡顿）
    }
}
