# MiCall 用户端 H5 —— zsky.com
# 复制到 /etc/nginx/sites-available/micall 并软链到 sites-enabled。
# 静态产物来自 `cd frontend && npm run build` 的 frontend/dist。

server {
    listen 80;
    listen [::]:80;
    server_name zsky.com www.zsky.com;

    root /var/www/micall;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 实时控制信令 WSS 反代（前端 VITE_SIGNALING_URL=wss://zsky.com/realtime/signal）──
    # 后端 micall.cli run-server 监听 127.0.0.1:8787（仅本地，外网只经此 443 反代）。
    # certbot 会把本 server 升到 443；本 location 一并迁移，于是浏览器走加密 wss://。
    location /realtime/signal {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # 长连接：通话期间不超时
        proxy_send_timeout 3600s;
    }
}
